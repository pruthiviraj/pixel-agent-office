name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    name: smoke (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [18, 20]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero npm dependencies — no install step needed.
      - name: Smoke test (syntax check + dry-run sprint)
        run: npm run smoke
